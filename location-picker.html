<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Výchozí poloha – Hledám Domov Asistent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #f8f9fa;
      color: #202124;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8eaed;
      padding: 14px 24px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    header p {
      margin-top: 4px;
      color: #5f6368;
      font-size: 12px;
    }

    .toolbar {
      background: #fff;
      border-bottom: 1px solid #e8eaed;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #search-wrapper {
      position: relative;
      flex: 1;
      max-width: 520px;
    }

    #search {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
    }

    #search:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26,115,232,.15);
    }

    #search-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 6px;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      list-style: none;
      z-index: 1000;
      overflow: hidden;
    }

    #search-dropdown li {
      padding: 9px 12px;
      cursor: pointer;
      font-size: 12px;
      border-bottom: 1px solid #f1f3f4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #search-dropdown li:last-child { border-bottom: none; }
    #search-dropdown li:hover { background: #f1f3f4; }
    #search-dropdown li.dropdown-empty { color: #9aa0a6; cursor: default; }
    #search-dropdown li.dropdown-empty:hover { background: none; }

    #map {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    footer {
      background: #fff;
      border-top: 1px solid #e8eaed;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .coords-label {
      color: #5f6368;
      font-size: 12px;
    }

    #coords {
      font-weight: 600;
      font-size: 12px;
      color: #202124;
      min-width: 180px;
    }

    #btn-save {
      margin-left: auto;
      padding: 8px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }

    #btn-save:hover:not(:disabled) { background: #1557b0; }
    #btn-save:disabled { background: #dadce0; color: #9aa0a6; cursor: default; }

    #status {
      display: none;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 4px;
    }

    .status--success { background: #f0fdf4; color: #15803d; }
    .status--error   { background: #fef2f2; color: #dc2626; }
  </style>
</head>
<body>
  <header>
    <h1>Nastavit výchozí polohu</h1>
    <p>Hledejte adresu nebo klikněte na mapu. Poloha se použije pro výpočet vzdáleností k nemovitostem.</p>
  </header>

  <div class="toolbar">
    <div id="search-wrapper">
      <input id="search" type="text" placeholder="Zadejte adresu nebo místo…" autocomplete="off" />
      <ul id="search-dropdown"></ul>
    </div>
  </div>

  <div id="map"></div>

  <footer>
    <span class="coords-label">Vybraná poloha:</span>
    <span id="coords">—</span>
    <div id="status"></div>
    <button id="btn-save" disabled>Uložit</button>
  </footer>

  <script src="dist/location-picker/location-picker.js"></script>
</body>
</html>
