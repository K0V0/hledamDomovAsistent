<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hledám Domov Asistent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #fff;
    }

    header {
      padding: 12px 16px 10px;
      border-bottom: 1px solid #e8eaed;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #202124;
      white-space: nowrap;
    }

    nav ul {
      list-style: none;
    }

    nav ul li a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 16px;
      color: #202124;
      text-decoration: none;
      cursor: pointer;
      border-bottom: 1px solid #f1f3f4;
      transition: background 0.1s;
    }

    nav ul li a:hover {
      background: #f1f3f4;
    }

    nav ul li a .icon {
      font-size: 16px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Hledám Domov Asistent</h1>
  </header>
  <nav>
    <ul>
      <li>
        <a id="menu-overview" href="#">
          <span class="icon">🏠</span>
          Přehled mých nemovitostí
        </a>
      </li>
    </ul>
  </nav>
  <script src="dist/popup/popup.js"></script>
</body>
</html>
